name: Strava Daily ETL Pipeline

# KHI NÀO THÌ CHẠY?
on:
  schedule:
    - cron: '0 23 * * *' # Chạy lúc 23:00 UTC (Tương đương 6h sáng giờ Việt Nam)
  workflow_dispatch:     # Bật tính năng tạo ra cái nút để bạn tự bấm chạy bằng tay (rất tiện để test)

# CẦN LÀM NHỮNG GÌ?
jobs:
  run-pipeline:
    runs-on: ubuntu-latest # Thuê 1 máy ảo Linux miễn phí của GitHub

    steps:
      - name: 1. Lấy code từ kho lưu trữ về máy ảo
        uses: actions/checkout@v4

      - name: 2. Cài đặt Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Giúp các lần chạy sau cài thư viện nhanh hơn

      - name: 3. Cài đặt các thư viện cần thiết
        run: |
          python -m pip install --upgrade pip
          pip install pandas sqlalchemy psycopg2-binary requests python-dotenv

      - name: 4. Kích hoạt Pipeline và bơm chìa khóa an toàn
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: python strava_etl_pipeline.py
